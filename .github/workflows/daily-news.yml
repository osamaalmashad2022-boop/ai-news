name: Daily AI News Automation

on:
  schedule:
    # Runs every morning at 05:00 UTC (07:00 AM Egypt time)
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Ingest Script (Fetch + Gemini 2.5 Flash Summarize)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/ingest.mjs

      - name: Commit and push new news files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/news/ src/content/tools/
          if git diff --staged --quiet; then
            echo "No new news articles to commit today."
          else
            git commit -m "chore(news): auto-update daily AI news articles"
            git push
          fi
